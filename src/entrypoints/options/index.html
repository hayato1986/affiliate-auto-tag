<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>アフィリエイトID自動付与 - 設定</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>アフィリエイトID自動付与</h1>
        <p class="subtitle">設定</p>
      </header>

      <main>
        <!-- サイト設定セクション（JSで動的生成） -->
        <div id="sites-container"></div>

        <!-- 動作テスト -->
        <section class="card">
          <h2>動作テスト</h2>
          <p class="help-text">
            設定後、以下のリンクをクリックしてURLにパラメータが付与されることを確認してください。
          </p>
          <div id="test-links"></div>
        </section>

        <!-- プライバシー情報 -->
        <section class="card">
          <h2>プライバシー</h2>
          <ul class="privacy-list">
            <li>閲覧履歴は収集しません</li>
            <li>外部サーバーへの通信は行いません</li>
            <li>設定はChromeの同期ストレージにのみ保存されます</li>
          </ul>
        </section>
      </main>

      <div id="save-feedback" class="save-feedback hidden" aria-live="polite">
        保存しました
      </div>
      <div id="status-announce" class="sr-only" aria-live="polite"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
